<style>
:root{
  --org:#E8401C;
  --org-l:#FF6B3D;
  --org-d:#C42E0C;
  --blu:#1A6AE8;
  --blu-l:#3D8BFF;
  --wht:#FFFFFF;
  --off:#F8F5F2;
  --card-glass:rgba(255,255,255,0.72);
  --shadow:0 8px 32px rgba(232,64,28,0.10);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;font-size:16px}
body{font-family:'Nunito',sans-serif;background:#fff;color:#1a1a1a;overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* ─── LOADER ─── */
#loader{position:fixed;inset:0;background:#fff;display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s .2s,visibility .5s .2s}
#loader.hide{opacity:0;visibility:hidden;pointer-events:none}
.loader-ring{width:56px;height:56px;border:4px solid rgba(232,64,28,.15);border-top-color:var(--org);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── 3D CANVAS BG ─── */
#bg3d{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ─── NAV ─── */
header{position:fixed;top:0;left:0;right:0;z-index:200;transition:all .35s}
nav{display:flex;align-items:center;justify-content:space-between;padding:0 5%;height:70px;background:rgba(255,255,255,.82);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1.5px solid rgba(232,64,28,.12);transition:all .35s}
nav.scrolled{background:rgba(255,255,255,.97);box-shadow:0 4px 28px rgba(232,64,28,.10)}
.nav-logo img{height:44px;object-fit:contain}
.nav-links{display:flex;gap:1.8rem;list-style:none;align-items:center}
.nav-links a{text-decoration:none;color:#333;font-weight:700;font-size:.88rem;letter-spacing:.3px;transition:color .2s;position:relative;padding-bottom:2px}
.nav-links a::after{content:'';position:absolute;bottom:-2px;left:0;width:0;height:2.5px;background:var(--org);border-radius:2px;transition:width .3s}
.nav-links a:hover{color:var(--org)}
.nav-links a:hover::after,.nav-links a.active::after{width:100%}
.nav-links a.active{color:var(--org)}
.nav-cta{background:var(--org)!important;color:#fff!important;padding:9px 22px!important;border-radius:25px!important;transition:all .25s!important}
.nav-cta::after{display:none!important}
.nav-cta:hover{background:var(--org-d)!important;transform:translateY(-2px);box-shadow:0 6px 18px rgba(232,64,28,.38)!important}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px}
.hamburger span{width:24px;height:2.5px;background:var(--org);border-radius:2px;transition:all .3s}
.mobile-menu{display:none;position:fixed;top:70px;left:0;right:0;background:rgba(255,255,255,.98);backdrop-filter:blur(20px);padding:20px 5% 28px;border-bottom:1px solid rgba(232,64,28,.1);z-index:199;flex-direction:column;gap:0}
.mobile-menu.open{display:flex}
.mobile-menu a{display:block;padding:12px 0;color:#333;font-weight:700;font-size:1rem;text-decoration:none;border-bottom:1px solid rgba(0,0,0,.05);transition:color .2s}
.mobile-menu a:hover{color:var(--org)}

/* ─── HERO ─── */
#hero{position:relative;min-height:100vh;display:flex;align-items:center;padding:90px 5% 60px;z-index:1;overflow:hidden}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(232,64,28,.05) 0%,rgba(255,255,255,0) 50%,rgba(26,106,232,.04) 100%);pointer-events:none}
.hero-content{max-width:640px;z-index:2;position:relative}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(232,64,28,.09);border:1.5px solid rgba(232,64,28,.2);color:var(--org);padding:6px 16px;border-radius:30px;font-size:.78rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:22px;animation:fadeUp .7s .2s both}
.hero-badge-dot{width:7px;height:7px;background:var(--org);border-radius:50%;animation:pulse 1.8s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(232,64,28,.4)}50%{box-shadow:0 0 0 6px rgba(232,64,28,0)}}
.hero-h1{font-size:clamp(2.6rem,5.5vw,4.6rem);font-weight:900;line-height:1.06;margin-bottom:22px;animation:fadeUp .7s .4s both}
.hero-h1 .t1{display:block;color:#111}
.hero-h1 .t2{display:block;color:var(--org)}
.hero-h1 .t3{display:block;color:var(--blu);font-size:.56em;font-weight:700;margin-top:4px}
.hero-p{font-size:1.08rem;color:#555;line-height:1.75;margin-bottom:38px;max-width:510px;animation:fadeUp .7s .6s both}
.hero-btns{display:flex;gap:14px;flex-wrap:wrap;animation:fadeUp .7s .8s both}
.btn-primary{background:var(--org);color:#fff;padding:13px 30px;border-radius:40px;font-weight:800;font-size:.95rem;text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:all .3s;box-shadow:0 4px 18px rgba(232,64,28,.28);border:none;cursor:pointer;font-family:'Nunito',sans-serif}
.btn-primary:hover{background:var(--org-d);transform:translateY(-3px);box-shadow:0 8px 28px rgba(232,64,28,.38)}
.btn-outline{background:transparent;color:var(--blu);padding:13px 30px;border-radius:40px;font-weight:800;font-size:.95rem;text-decoration:none;display:inline-flex;align-items:center;gap:8px;border:2px solid var(--blu);transition:all .3s}
.btn-outline:hover{background:var(--blu);color:#fff;transform:translateY(-3px)}
.hero-stats{display:flex;gap:36px;margin-top:52px;animation:fadeUp .7s 1s both;flex-wrap:wrap}
.stat{text-align:left}
.stat-n{font-size:2.1rem;font-weight:900;color:var(--org);font-family:'Space Mono',monospace;line-height:1}
.stat-l{font-size:.72rem;font-weight:700;color:#999;letter-spacing:1.2px;text-transform:uppercase;margin-top:2px}

/* Hero Right Visual */
.hero-right{position:absolute;right:4%;top:50%;transform:translateY(-50%);width:44%;max-width:520px;z-index:2;animation:fadeLeft .9s .5s both}
@keyframes fadeLeft{from{opacity:0;transform:translateY(-50%) translateX(50px)}to{opacity:1;transform:translateY(-50%) translateX(0)}}
.hero-glass-stack{position:relative;width:100%;aspect-ratio:1}
.hgs-main{position:absolute;inset:0;background:var(--card-glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:28px;border:1.5px solid rgba(255,255,255,.9);box-shadow:0 24px 64px rgba(232,64,28,.14),0 0 0 1px rgba(232,64,28,.06);overflow:hidden;animation:float3d 5s ease-in-out infinite}
@keyframes float3d{0%,100%{transform:perspective(800px) rotateX(3deg) rotateY(-4deg) translateY(0)}50%{transform:perspective(800px) rotateX(-2deg) rotateY(4deg) translateY(-16px)}}
.hgs-top{background:linear-gradient(135deg,var(--org) 0%,var(--org-l) 100%);height:45%;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.hgs-top::before{content:'';position:absolute;width:180px;height:180px;background:rgba(255,255,255,.12);border-radius:50%;top:-70px;right:-40px}
.hgs-top::after{content:'';position:absolute;width:100px;height:100px;background:rgba(255,255,255,.08);border-radius:50%;bottom:-30px;left:-20px}
.hgs-icon-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:18px;position:relative;z-index:1}
.hgs-ic{width:52px;height:52px;background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.35);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;backdrop-filter:blur(4px);transition:transform .3s;cursor:default}
.hgs-ic:hover{transform:scale(1.12) rotate(6deg)}
.hgs-body{padding:20px 24px;display:flex;flex-direction:column;gap:10px}
.hgs-title{font-size:1rem;font-weight:800;color:#111}
.hgs-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(232,64,28,.09);color:var(--org);padding:4px 12px;border-radius:20px;font-size:.72rem;font-weight:800;letter-spacing:.8px;text-transform:uppercase;width:fit-content}
.hgs-bars{display:flex;flex-direction:column;gap:7px}
.hgs-bar-wrap{display:flex;align-items:center;gap:8px}
.hgs-bar-label{font-size:.7rem;color:#888;font-weight:700;width:60px;flex-shrink:0}
.hgs-bar{flex:1;height:7px;background:#f0f0f0;border-radius:4px;overflow:hidden}
.hgs-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--org),var(--org-l));animation:barIn 1.2s ease-out both}
@keyframes barIn{from{width:0}to{width:var(--w,70%)}}
.float-chip{position:absolute;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:14px;padding:10px 16px;box-shadow:0 8px 30px rgba(0,0,0,.1);border:1.5px solid rgba(255,255,255,.9);font-size:.78rem;font-weight:800;display:flex;align-items:center;gap:8px;animation:chipFloat 4s ease-in-out infinite}
.chip-1{top:-16px;right:-16px;color:var(--org);animation-delay:0s}
.chip-2{bottom:16px;left:-24px;color:var(--blu);animation-delay:2s}
@keyframes chipFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

/* ─── TICKER ─── */
.ticker{position:relative;z-index:1;background:var(--org);padding:14px 0;overflow:hidden}
.ticker-track{display:flex;gap:0;animation:ticker 35s linear infinite;width:max-content}
.ticker-item{white-space:nowrap;color:#fff;font-size:.8rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;padding:0 28px;display:flex;align-items:center;gap:10px}
.ticker-item::after{content:'◆';font-size:.5rem;opacity:.5}

/* ─── SECTIONS ─── */
section{position:relative;z-index:1}
.sec-inner{max-width:1200px;margin:0 auto;padding:96px 5%}
.sec-tag{display:inline-block;background:rgba(232,64,28,.09);color:var(--org);padding:4px 14px;border-radius:20px;font-size:.72rem;font-weight:800;letter-spacing:1.8px;text-transform:uppercase;margin-bottom:14px}
.sec-h{font-size:clamp(1.9rem,3.8vw,2.9rem);font-weight:900;line-height:1.1;color:#111;margin-bottom:14px}
.sec-h span{color:var(--org)}
.sec-sub{font-size:1rem;color:#666;line-height:1.75;max-width:520px;margin-bottom:56px}
.sec-center{text-align:center}
.sec-center .sec-sub{margin:0 auto 56px}

/* ─── ABOUT ─── */
#about{background:var(--off)}
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center}
.about-orbit-wrap{position:relative;width:340px;height:340px;margin:auto}
.orbit-ring{position:absolute;top:50%;left:50%;border-radius:50%;border:2px dashed;transform:translate(-50%,-50%)}
.orbit-r1{width:320px;height:320px;border-color:rgba(232,64,28,.18);animation:orbit 20s linear infinite}
.orbit-r2{width:220px;height:220px;border-color:rgba(26,106,232,.15);animation:orbit 12s linear infinite reverse}
@keyframes orbit{to{transform:translate(-50%,-50%) rotate(360deg)}}
.orbit-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:150px;height:150px;background:#fff;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 20px 50px rgba(232,64,28,.18);gap:2px}
.orbit-n{font-size:2.1rem;font-weight:900;color:var(--org);font-family:'Space Mono',monospace;line-height:1}
.orbit-t{font-size:.6rem;font-weight:800;color:#aaa;letter-spacing:1.5px;text-transform:uppercase}
.orbit-dot{position:absolute;width:46px;height:46px;background:#fff;border-radius:13px;box-shadow:0 6px 20px rgba(0,0,0,.08);display:flex;align-items:center;justify-content:center;font-size:1.2rem}
.about-checklist{list-style:none;display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:22px 0}
.about-checklist li{display:flex;align-items:center;gap:9px;font-size:.9rem;color:#444;font-weight:600}
.about-checklist li::before{content:'✓';width:22px;height:22px;background:rgba(232,64,28,.1);color:var(--org);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:900;flex-shrink:0}
.commit-box{background:rgba(232,64,28,.05);border-left:4px solid var(--org);border-radius:0 12px 12px 0;padding:16px 20px;margin-top:20px;font-size:.88rem;color:#555;line-height:1.7;font-style:italic}

/* ─── SOLUTIONS ─── */
#solutions{background:#fff}
.sol-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.flip-card{height:200px;perspective:1000px;cursor:pointer}
.flip-card-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .6s cubic-bezier(.175,.885,.32,1.275)}
.flip-card:hover .flip-card-inner{transform:rotateY(180deg)}
.flip-front,.flip-back{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:20px;padding:26px}
.flip-front{background:var(--card-glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1.5px solid rgba(255,255,255,.9);box-shadow:0 8px 32px rgba(232,64,28,.07);display:flex;flex-direction:column;justify-content:space-between}
.flip-back{background:linear-gradient(135deg,var(--org) 0%,var(--org-l) 100%);transform:rotateY(180deg);display:flex;flex-direction:column;justify-content:center;color:#fff}
.flip-icon{width:48px;height:48px;background:rgba(232,64,28,.1);border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:1.35rem;transition:all .3s}
.flip-card:hover .flip-icon{background:rgba(232,64,28,.2)}
.flip-title{font-size:1rem;font-weight:800;color:#111;margin-top:12px}
.flip-arr{font-size:.85rem;color:var(--org);font-weight:700}
.flip-back-title{font-size:1rem;font-weight:800;margin-bottom:8px}
.flip-back-desc{font-size:.82rem;line-height:1.6;opacity:.92}

/* ─── PRODUCTS ─── */
#products{background:var(--off)}
.prod-tabs{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:40px;justify-content:center}
.prod-tab{background:#fff;border:1.5px solid #e8e8e8;color:#666;padding:8px 18px;border-radius:25px;font-size:.8rem;font-weight:800;cursor:pointer;transition:all .25s;font-family:'Nunito',sans-serif}
.prod-tab.active,.prod-tab:hover{background:var(--org);color:#fff;border-color:var(--org);box-shadow:0 4px 14px rgba(232,64,28,.28)}
.prod-panels{position:relative}
.prod-panel{display:none;animation:fadeIn .4s ease}
.prod-panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.prod-spec-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.spec-card{background:var(--card-glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1.5px solid rgba(255,255,255,.9);border-radius:18px;padding:22px;box-shadow:0 6px 24px rgba(0,0,0,.05);transition:all .3s}
.spec-card:hover{transform:translateY(-4px);box-shadow:0 12px 36px rgba(232,64,28,.1)}
.spec-label{font-size:.68rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--org);margin-bottom:6px}
.spec-val{font-size:.88rem;color:#444;line-height:1.6;font-weight:600}
.spec-card-wide{grid-column:1/-1}
.prod-hero-card{background:linear-gradient(135deg,var(--org) 0%,var(--org-l) 100%);border-radius:20px;padding:28px;color:#fff;margin-bottom:20px;display:flex;align-items:center;gap:20px}
.phc-icon{font-size:2.8rem}
.phc-title{font-size:1.2rem;font-weight:900}
.phc-sub{font-size:.85rem;opacity:.9;margin-top:4px}
/* display racks list */
.rack-list{display:flex;flex-wrap:wrap;gap:8px}
.rack-pill{background:#fff;border:1.5px solid rgba(232,64,28,.15);border-radius:25px;padding:5px 14px;font-size:.78rem;font-weight:700;color:#555;transition:all .25s}
.rack-pill:hover{border-color:var(--org);color:var(--org)}

/* ─── BRANDS ─── */
#brands{background:#fff}
.brands-label{text-align:center;font-size:.72rem;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:#ccc;margin-bottom:36px}
.brands-wrap{overflow:hidden;position:relative}
.brands-wrap::before,.brands-wrap::after{content:'';position:absolute;top:0;bottom:0;width:80px;z-index:2}
.brands-wrap::before{left:0;background:linear-gradient(to right,#fff,transparent)}
.brands-wrap::after{right:0;background:linear-gradient(to left,#fff,transparent)}
.brands-row{display:flex;gap:0;animation:ticker 28s linear infinite;width:max-content;margin-bottom:14px}
.brands-row-r{animation:tickerR 28s linear infinite}
@keyframes tickerR{from{transform:translateX(-50%)}to{transform:translateX(0)}}
.brand-pill{display:inline-flex;align-items:center;padding:8px 20px;border:1.5px solid #eeebeb;border-radius:40px;margin:0 5px;font-size:.82rem;font-weight:800;color:#555;white-space:nowrap;transition:all .25s;background:#fff}
.brand-pill:hover{border-color:var(--org);color:var(--org);transform:scale(1.06)}

/* ─── SERVICES ─── */
#services{background:var(--off)}
.svc-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:22px}
.svc-flip{height:280px;perspective:1000px;cursor:pointer}
.svc-flip-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .65s cubic-bezier(.175,.885,.32,1.275)}
.svc-flip:hover .svc-flip-inner{transform:rotateX(180deg)}
.svc-front,.svc-back{position:absolute;inset:0;border-radius:22px;padding:32px;backface-visibility:hidden;-webkit-backface-visibility:hidden}
.svc-front{background:var(--card-glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1.5px solid rgba(255,255,255,.9);box-shadow:0 8px 30px rgba(0,0,0,.06);display:flex;flex-direction:column}
.svc-back{background:linear-gradient(135deg,var(--blu) 0%,var(--blu-l) 100%);transform:rotateX(180deg);color:#fff;display:flex;flex-direction:column;justify-content:center}
.svc-num{font-family:'Space Mono',monospace;font-size:2.4rem;font-weight:700;color:rgba(232,64,28,.1);line-height:1}
.svc-title{font-size:1.1rem;font-weight:800;color:#111;margin:10px 0 8px}
.svc-desc-short{font-size:.85rem;color:#777;line-height:1.6}
.svc-hint{font-size:.72rem;color:var(--org);font-weight:700;margin-top:auto;letter-spacing:.5px}
.svc-back-title{font-size:1.1rem;font-weight:900;margin-bottom:12px}
.svc-back-desc{font-size:.83rem;line-height:1.65;opacity:.92}

/* ─── CONTACT ─── */
#contact{background:linear-gradient(150deg,#fff8f6 0%,#fff 40%,#f2f7ff 100%)}
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:72px;align-items:start}
.contact-item{display:flex;align-items:flex-start;gap:16px;margin-bottom:22px}
.c-icon{width:46px;height:46px;background:rgba(232,64,28,.1);border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;border:1.5px solid rgba(232,64,28,.15)}
.c-label{font-size:.68rem;font-weight:800;color:#aaa;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px}
.c-val{font-size:.93rem;color:#222;font-weight:700}
.c-val a{color:var(--org);text-decoration:none}
.contact-form-box{background:var(--card-glass);backdr
