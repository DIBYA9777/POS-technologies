<style>
:root{--org:#FB3819;--org-l:#FF5733;--org-d:#D42010;--blu:#2577FF;--blu-l:#5599FF;--off:#F8F5F2;--glass:rgba(255,255,255,0.84)}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;overflow-x:hidden}
body{font-family:'Nunito',sans-serif;background:#fff;color:#1a1a1a;overflow-x:hidden;-webkit-font-smoothing:antialiased;width:100%;max-width:100vw}
img,video,svg,canvas{max-width:100%}
section,header,footer,main,div{max-width:100vw;overflow-x:clip}

/* LOADER */
#loader{position:fixed;inset:0;background:#fff;display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s .3s,visibility .5s .3s}
#loader.hide{opacity:0;visibility:hidden;pointer-events:none}
.lring{width:52px;height:52px;border:4px solid rgba(251,56,25,.15);border-top-color:var(--org);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* 3D BG */
#bg3d{position:fixed;inset:0;z-index:0;pointer-events:none}

/* NAV */
header{position:fixed;top:0;left:0;right:0;z-index:200}
#navbar{display:flex;align-items:center;justify-content:space-between;padding:0 5%;height:66px;background:rgba(255,255,255,.93);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1.5px solid rgba(251,56,25,.12);transition:all .3s}
#navbar.scrolled{background:rgba(255,255,255,.99);box-shadow:0 4px 22px rgba(251,56,25,.1)}
.nav-logo a{display:flex;align-items:center;text-decoration:none}
.nav-logo img{height:42px;width:auto;display:block}
.nav-links{display:flex;gap:1.6rem;list-style:none;align-items:center}
.nav-links a{text-decoration:none;color:#333;font-weight:700;font-size:.87rem;letter-spacing:.3px;transition:color .2s;position:relative;padding-bottom:2px}
.nav-links a::after{content:'';position:absolute;bottom:-2px;left:0;width:0;height:2.5px;background:var(--org);border-radius:2px;transition:width .3s}
.nav-links a:hover,.nav-links a.active{color:var(--org)}
.nav-links a:hover::after,.nav-links a.active::after{width:100%}
.nav-cta{background:var(--org)!important;color:#fff!important;padding:9px 20px!important;border-radius:24px!important}
.nav-cta::after{display:none!important}
.nav-cta:hover{background:var(--org-d)!important}

/* HAMBURGER */
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:9px 10px;background:var(--org);border:none;border-radius:10px;align-items:center;justify-content:center;width:46px;height:46px;flex-shrink:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.hamburger span{width:22px;height:3px;background:#fff;border-radius:3px;transition:transform .3s,opacity .3s;display:block;transform-origin:center}

/* MOBILE MENU */
#mobileMenu{display:none;position:fixed;top:66px;left:0;right:0;width:100vw;background:#fff;border-top:3px solid var(--org);z-index:199;flex-direction:column;box-shadow:0 8px 24px rgba(0,0,0,.14);overflow:hidden}
#mobileMenu.open{display:flex}
#mobileMenu a{display:block;padding:14px 6%;color:#222;font-weight:700;font-size:.96rem;text-decoration:none;border-bottom:1px solid rgba(0,0,0,.06);-webkit-tap-highlight-color:transparent}
#mobileMenu a:active{background:rgba(251,56,25,.05)}
#mobileMenu .mm-cta{border-bottom:none;background:var(--org);color:#fff!important;margin:12px 5% 16px;border-radius:12px;text-align:center;padding:13px 5%}

/* HERO */
#hero{position:relative;min-height:100vh;display:flex;align-items:center;padding:88px 5% 60px;z-index:1;overflow:hidden}
.hero-ov{position:absolute;inset:0;background:linear-gradient(135deg,rgba(251,56,25,.05) 0%,transparent 50%,rgba(37,119,255,.04) 100%);pointer-events:none}
.hero-content{max-width:620px;z-index:2;position:relative;width:100%}
.hbadge{display:inline-flex;align-items:center;gap:8px;background:rgba(251,56,25,.09);border:1.5px solid rgba(251,56,25,.2);color:var(--org);padding:6px 16px;border-radius:30px;font-size:.76rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:20px;animation:fadeUp .7s .2s both}
.hbadge-dot{width:7px;height:7px;min-width:7px;background:var(--org);border-radius:50%;animation:pulse 1.8s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(251,56,25,.4)}50%{box-shadow:0 0 0 6px rgba(251,56,25,0)}}
.hero-h1{font-size:clamp(2rem,5.5vw,4.3rem);font-weight:900;line-height:1.06;margin-bottom:20px;animation:fadeUp .7s .4s both}
.hero-h1 .t1{display:block;color:#111}
.hero-h1 .t2{display:block;color:var(--org)}
.hero-h1 .t3{display:block;color:var(--blu);font-size:.55em;font-weight:700;margin-top:4px}
.hero-p{font-size:.99rem;color:#555;line-height:1.75;margin-bottom:36px;animation:fadeUp .7s .6s both}
.hero-btns{display:flex;gap:12px;flex-wrap:wrap;animation:fadeUp .7s .8s both}
.btn-pri{background:var(--org);color:#fff;padding:13px 28px;border-radius:40px;font-weight:800;font-size:.93rem;text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:all .28s;box-shadow:0 4px 16px rgba(251,56,25,.28);border:none;cursor:pointer;font-family:'Nunito',sans-serif;-webkit-tap-highlight-color:transparent}
.btn-pri:hover{background:var(--org-d);transform:translateY(-2px)}
.btn-out{background:transparent;color:var(--blu);padding:13px 28px;border-radius:40px;font-weight:800;font-size:.93rem;text-decoration:none;display:inline-flex;align-items:center;gap:8px;border:2px solid var(--blu);transition:all .28s;-webkit-tap-highlight-color:transparent}
.btn-out:hover{background:var(--blu);color:#fff;transform:translateY(-2px)}
.hero-stats{display:flex;gap:24px;margin-top:48px;animation:fadeUp .7s 1s both;flex-wrap:wrap}
.stat-n{font-size:1.85rem;font-weight:900;color:var(--org);font-family:'Space Mono',monospace;line-height:1}
.stat-l{font-size:.67rem;font-weight:700;color:#999;letter-spacing:1.2px;text-transform:uppercase;margin-top:2px}

/* HERO RIGHT GLASS CARD */
.hero-right{position:absolute;right:4%;top:50%;transform:translateY(-50%);width:40%;max-width:470px;z-index:2;animation:fLeft .9s .5s both}
@keyframes fLeft{from{opacity:0;transform:translateY(-50%) translateX(40px)}to{opacity:1;transform:translateY(-50%) translateX(0)}}
.hgs{position:relative;width:100%;aspect-ratio:1}
.hgs-main{position:absolute;inset:0;background:var(--glass);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-radius:26px;border:1.5px solid rgba(255,255,255,.9);box-shadow:0 20px 55px rgba(251,56,25,.14);overflow:hidden;animation:f3d 5s ease-in-out infinite}
@keyframes f3d{0%,100%{transform:perspective(800px) rotateX(3deg) rotateY(-4deg) translateY(0)}50%{transform:perspective(800px) rotateX(-2deg) rotateY(4deg) translateY(-14px)}}
.hgs-top{background:linear-gradient(135deg,var(--org),var(--org-l));height:45%;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.hgs-top::before{content:'';position:absolute;width:150px;height:150px;background:rgba(255,255,255,.1);border-radius:50%;top:-55px;right:-25px}
.hgs-icg{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;padding:15px;position:relative;z-index:1}
.hgs-ic{width:48px;height:48px;background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.3);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.25rem;transition:transform .3s}
.hgs-ic:hover{transform:scale(1.1) rotate(5deg)}
.hgs-body{padding:17px 20px;display:flex;flex-direction:column;gap:8px}
.hgs-title{font-size:.93rem;font-weight:800;color:#111}
.hgs-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(251,56,25,.09);color:var(--org);padding:4px 11px;border-radius:18px;font-size:.68rem;font-weight:800;letter-spacing:.8px;text-transform:uppercase;width:fit-content}
.hgs-bars{display:flex;flex-direction:column;gap:6px}
.hgs-bw{display:flex;align-items:center;gap:7px}
.hgs-bl{font-size:.67rem;color:#888;font-weight:700;width:55px;flex-shrink:0}
.hgs-bar{flex:1;height:7px;background:#f0f0f0;border-radius:4px;overflow:hidden}
.hgs-bf{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--org),var(--org-l));animation:bIn 1.3s ease-out both}
@keyframes bIn{from{width:0}to{width:var(--w,70%)}}
.fchip{position:absolute;background:rgba(255,255,255,.96);border-radius:12px;padding:9px 13px;box-shadow:0 6px 22px rgba(0,0,0,.1);border:1.5px solid rgba(255,255,255,.9);font-size:.74rem;font-weight:800;display:flex;align-items:center;gap:7px;animation:cFloat 4s ease-in-out infinite;white-space:nowrap}
.chip1{top:-13px;right:-13px;color:var(--org)}
.chip2{bottom:13px;left:-20px;color:var(--blu);animation-delay:2s}
@keyframes cFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}

/* TICKER */
.ticker{position:relative;z-index:1;background:var(--org);padding:13px 0;overflow:hidden}
.ticker-track{display:flex;animation:ticker 32s linear infinite;width:max-content}
.titem{white-space:nowrap;color:#fff;font-size:.77rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;padding:0 25px;display:flex;align-items:center;gap:9px}
.titem::after{content:'◆';font-size:.44rem;opacity:.5}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* SECTIONS */
section{position:relative;z-index:1}
.si{max-width:1200px;margin:0 auto;padding:88px 5%}
.stag{display:inline-block;background:rgba(251,56,25,.09);color:var(--org);padding:4px 13px;border-radius:18px;font-size:.69rem;font-weight:800;letter-spacing:1.8px;text-transform:uppercase;margin-bottom:12px}
.sh{font-size:clamp(1.65rem,3.6vw,2.75rem);font-weight:900;line-height:1.1;color:#111;margin-bottom:12px}
.sh span{color:var(--org)}
.ssub{font-size:.96rem;color:#666;line-height:1.75;max-width:520px;margin-bottom:50px}
.sc{text-align:center}
.sc .ssub{margin:0 auto 50px}

/* ABOUT */
#about{background:var(--off)}
.ag{display:grid;grid-template-columns:1fr 1fr;gap:58px;align-items:center}
.aorbit{position:relative;width:310px;height:310px;margin:auto}
.oring{position:absolute;top:50%;left:50%;border-radius:50%;border:2px dashed;transform:translate(-50%,-50%)}
.or1{width:290px;height:290px;border-color:rgba(251,56,25,.18);animation:orbit 20s linear infinite}
.or2{width:195px;height:195px;border-color:rgba(37,119,255,.14);animation:orbit 12s linear infinite reverse}
@keyframes orbit{to{transform:translate(-50%,-50%) rotate(360deg)}}
.ocenter{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:122px;height:122px;background:#fff;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 16px 42px rgba(251,56,25,.18)}
.ocen-n{font-size:1.75rem;font-weight:900;color:var(--org);font-family:'Space Mono',monospace;line-height:1}
.ocen-t{font-size:.57rem;font-weight:800;color:#aaa;letter-spacing:1.5px;text-transform:uppercase}
.odot{position:absolute;width:40px;height:40px;background:#fff;border-radius:11px;box-shadow:0 5px 16px rgba(0,0,0,.08);display:flex;align-items:center;justify-content:center;font-size:1.05rem}
.ackl{list-style:none;display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:20px 0}
.ackl li{display:flex;align-items:center;gap:8px;font-size:.87rem;color:#444;font-weight:600}
.ackl li::before{content:'✓';width:21px;height:21px;min-width:21px;background:rgba(251,56,25,.1);color:var(--org);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.67rem;font-weight:900}
.cbox{background:rgba(251,56,25,.05);border-left:4px solid var(--org);border-radius:0 11px 11px 0;padding:14px 17px;margin-top:17px;font-size:.85rem;color:#555;line-height:1.7;font-style:italic}

/* SOLUTIONS */
#solutions{background:#fff}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:17px}
.fcard{perspective:1000px;cursor:pointer;min-height:192px;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.fci{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .42s cubic-bezier(.4,0,.2,1);min-height:192px;will-change:transform}
.fcard:not(.flipped) .fci:hover{transform:rotateY(180deg)}
.fcard.flipped .fci{transform:rotateY(180deg)}
.ff,.fb{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:17px;padding:23px;will-change:transform}
.ff{background:var(--glass);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1.5px solid rgba(255,255,255,.9);box-shadow:0 6px 26px rgba(251,56,25,.07);display:flex;flex-direction:column;justify-content:space-between;min-height:192px}
.fb{background:linear-gradient(135deg,var(--org),var(--org-l));transform:rotateY(180deg);display:flex;flex-direction:column;justify-content:center;color:#fff;min-height:192px}
.ficon{width:45px;height:45px;background:rgba(251,56,25,.1);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.28rem}
.ftitle{font-size:.96rem;font-weight:800;color:#111;margin-top:10px}
.farr{font-size:.76rem;color:var(--org);font-weight:700}
.fbt{font-size:.95rem;font-weight:800;margin-bottom:7px}
.fbd{font-size:.79rem;line-height:1.6;opacity:.95}

/* PRODUCTS */
#products{background:var(--off)}
.ptabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:36px;justify-content:center}
.ptab{background:#fff;border:1.5px solid #e8e8e8;color:#666;padding:7px 14px;border-radius:23px;font-size:.74rem;font-weight:800;cursor:pointer;transition:all .22s;font-family:'Nunito',sans-serif;-webkit-tap-highlight-color:transparent}
.ptab.active,.ptab:hover{background:var(--org);color:#fff;border-color:var(--org);box-shadow:0 3px 11px rgba(251,56,25,.28)}
.ppanel{display:none;animation:fadeIn .33s ease}
.ppanel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.psgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:13px}
.scard{background:var(--glass);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1.5px solid rgba(255,255,255,.9);border-radius:15px;padding:19px;box-shadow:0 4px 18px rgba(0,0,0,.05);transition:transform .24s}
.scard:hover{transform:translateY(-3px)}
.slbl{font-size:.64rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--org);margin-bottom:5px}
.sval{font-size:.84rem;color:#444;line-height:1.6;font-weight:600}
.swide{grid-column:1/-1}
.phcard{background:linear-gradient(135deg,var(--org),var(--org-l));border-radius:17px;padding:21px 24px;color:#fff;margin-bottom:16px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.phci{font-size:2.5rem;line-height:1}
.phct{font-size:1.07rem;font-weight:900}
.phcs{font-size:.8rem;opacity:.9;margin-top:3px}
.rlist{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.rpill{background:#fff;border:1.5px solid rgba(251,56,25,.14);border-radius:23px;padding:4px 12px;font-size:.73rem;font-weight:700;color:#555;transition:all .2s;-webkit-tap-highlight-color:transparent}
.rpill:hover{border-color:var(--org);color:var(--org)}

/* BRANDS */
#brands{background:#fff}
.blabel{text-align:center;font-size:.68rem;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:#ccc;margin-bottom:30px}
.bwrap{overflow:hidden;position:relative}
.bwrap::before,.bwrap::after{content:'';position:absolute;top:0;bottom:0;width:50px;z-index:2;pointer-events:none}
.bwrap::before{left:0;background:linear-gradient(to right,#fff,transparent)}
.bwrap::after{right:0;background:linear-gradient(to left,#fff,transparent)}
.brow{display:flex;animation:ticker 25s linear infinite;width:max-content;margin-bottom:11px}
.browR{animation:tickerR 25s linear infinite}
@keyframes tickerR{from{transform:translateX(-50%)}to{transform:translateX(0)}}
.bpill{display:inline-flex;align-items:center;padding:7px 17px;border:1.5px solid #eee;border-radius:36px;margin:0 4px;font-size:.79rem;font-weight:800;color:#555;white-space:nowrap;transition:all .21s;background:#fff}
.bpill:hover{border-color:var(--org);color:var(--org);transform:scale(1.05)}

/* SERVICES */
#services{background:var(--off)}
.svgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:19px}
.sflip{min-height:265px;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.sfi{position:relative;width:100%;height:100%;min-height:265px;transform-style:preserve-3d;transition:transform .42s cubic-bezier(.4,0,.2,1);will-change:transform}
.sflip:not(.flipped) .sfi:hover{transform:rotateX(180deg)}
.sflip.flipped .sfi{transform:rotateX(180deg)}
.sfront,.sback{position:absolute;inset:0;border-radius:19px;padding:28px;backface-visibility:hidden;-webkit-backface-visibility:hidden;will-change:transform}
.sfront{background:var(--glass);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1.5px solid rgba(255,255,255,.9);box-shadow:0 6px 24px rgba(0,0,0,.06);display:flex;flex-direction:column;min-height:265px}
.sback{background:linear-gradient(135deg,var(--blu),var(--blu-l));transform:rotateX(180deg);color:#fff;display:flex;flex-direction:column;justify-content:center;min-height:265px}
.snum{font-family:'Space Mono',monospace;font-size:2.1rem;font-weight:700;color:rgba(251,56,25,.1);line-height:1}
.stitle{font-size:1rem;font-weight:800;color:#111;margin:8px 0 7px}
.sdesc{font-size:.82rem;color:#777;line-height:1.6}
.shint{font-size:.69rem;color:var(--org);font-weight:700;margin-top:auto;letter-spacing:.3px}
.sbt{font-size:1rem;font-weight:900;margin-bottom:10px}
.sbd{font-size:.8rem;line-height:1.65;opacity:.95}

/* CONTACT */
#contact{background:linear-gradient(150deg,#fff8f6 0%,#fff 40%,#f2f7ff 100%)}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:65px;align-items:start}
.citem{display:flex;align-items:flex-start;gap:13px;margin-bottom:19px}
.cico{width:43px;height:43px;min-width:43px;background:rgba(251,56,25,.1);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1rem;border:1.5px solid rgba(251,56,25,.14)}
.clbl{font-size:.65rem;font-weight:800;color:#aaa;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px}
.cval{font-size:.89rem;color:#222;font-weight:700;word-break:break-word}
.cval a{color:var(--org);text-decoration:none}
.cform{background:var(--glass);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1.5px solid rgba(255,255,255,.9);border-radius:21px;padding:30px;box-shadow:0 13px 42px rgba(251,56,25,.08)}
.cftitle{font-size:1.08rem;font-weight:900;color:#111;margin-bottom:20px}
.fgrp{margin-bottom:12px}
.flbl{display:block;font-size:.66rem;font-weight:800;color:#aaa;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px}
.finp,.fsel,.fta{width:100%;background:#fff;border:1.5px solid #e8e8e8;border-radius:11px;padding:11px 13px;color:#222;font-family:'Nunito',sans-serif;font-size:.87rem;font-weight:600;transition:border-color .22s;outline:none;resize:none}
.finp:focus,.fsel:focus,.fta:focus{border-color:var(--org);box-shadow:0 0 0 3px rgba(251,56,25,.1)}
.fta{height:86px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fsub{width:100%;background:var(--org);color:#
