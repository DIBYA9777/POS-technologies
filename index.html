<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS Technologies – We Create Code</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #E8401C;
    --orange-light: #FF6B3D;
    --orange-dark: #C42E0C;
    --blue: #1A6AE8;
    --blue-light: #3D8BFF;
    --white: #FFFFFF;
    --off-white: #F8F6F3;
    --dark: #0D0D0D;
    --gray: #888;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Exo 2', sans-serif;
    background: #fff;
    color: #111;
    overflow-x: hidden;
  }

  /* ── CANVAS BG ── */
  #bg-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 0 5%;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(232,64,28,0.15);
    transition: all 0.3s;
  }

  nav.scrolled {
    background: rgba(255,255,255,0.97);
    box-shadow: 0 4px 30px rgba(232,64,28,0.1);
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .nav-logo-icon {
    width: 42px; height: 42px;
    background: var(--orange);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .nav-logo-icon::before {
    content: '';
    position: absolute;
    top: 4px; left: 4px;
    width: 10px; height: 14px;
    border: 2px solid white;
    border-right: none;
  }

  .nav-logo-icon::after {
    content: '●';
    color: white;
    font-size: 18px;
    position: absolute;
    right: 5px;
  }

  .nav-brand {
    font-size: 1.3rem;
    font-weight: 700;
  }

  .nav-brand span:first-child { color: var(--orange); }
  .nav-brand span:last-child { color: var(--blue); }

  .nav-links {
    display: flex;
    gap: 2rem;
    list-style: none;
  }

  .nav-links a {
    text-decoration: none;
    color: #333;
    font-weight: 600;
    font-size: 0.9rem;
    letter-spacing: 0.5px;
    transition: color 0.2s;
    position: relative;
  }

  .nav-links a::after {
    content: '';
    position: absolute;
    bottom: -4px; left: 0;
    width: 0; height: 2px;
    background: var(--orange);
    transition: width 0.3s;
  }

  .nav-links a:hover { color: var(--orange); }
  .nav-links a:hover::after { width: 100%; }

  .nav-cta {
    background: var(--orange);
    color: white !important;
    padding: 8px 20px;
    border-radius: 25px;
    font-weight: 700 !important;
    transition: all 0.2s !important;
  }

  .nav-cta:hover {
    background: var(--orange-dark) !important;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(232,64,28,0.4);
  }

  .nav-cta::after { display: none !important; }

  /* ── HERO ── */
  #hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    align-items: center;
    padding: 0 5%;
    z-index: 1;
    overflow: hidden;
  }

  .hero-bg-gradient {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(232,64,28,0.06) 0%, rgba(255,255,255,0) 50%, rgba(26,106,232,0.05) 100%);
    pointer-events: none;
  }

  .hero-content {
    max-width: 650px;
    z-index: 2;
  }

  .hero-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(232,64,28,0.08);
    border: 1px solid rgba(232,64,28,0.2);
    color: var(--orange);
    padding: 6px 16px;
    border-radius: 30px;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 24px;
    animation: fadeSlideUp 0.8s 0.2s both;
  }

  .hero-eyebrow::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--orange);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  .hero-title {
    font-size: clamp(2.8rem, 6vw, 5rem);
    font-weight: 900;
    line-height: 1.05;
    margin-bottom: 24px;
    animation: fadeSlideUp 0.8s 0.4s both;
  }

  .hero-title .line1 { display: block; color: #111; }
  .hero-title .line2 { display: block; color: var(--orange); }
  .hero-title .line3 { display: block; color: var(--blue); font-size: 0.6em; font-weight: 600; }

  .hero-desc {
    font-size: 1.1rem;
    color: #555;
    line-height: 1.7;
    margin-bottom: 40px;
    max-width: 520px;
    animation: fadeSlideUp 0.8s 0.6s both;
  }

  .hero-buttons {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    animation: fadeSlideUp 0.8s 0.8s both;
  }

  .btn-primary {
    background: var(--orange);
    color: white;
    padding: 14px 32px;
    border-radius: 50px;
    font-weight: 700;
    font-size: 1rem;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: all 0.3s;
    box-shadow: 0 4px 20px rgba(232,64,28,0.3);
  }

  .btn-primary:hover {
    background: var(--orange-dark);
    transform: translateY(-3px);
    box-shadow: 0 8px 30px rgba(232,64,28,0.4);
  }

  .btn-secondary {
    background: transparent;
    color: #111;
    padding: 14px 32px;
    border-radius: 50px;
    font-weight: 700;
    font-size: 1rem;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border: 2px solid #ddd;
    transition: all 0.3s;
  }

  .btn-secondary:hover {
    border-color: var(--orange);
    color: var(--orange);
    transform: translateY(-3px);
  }

  .hero-stats {
    display: flex;
    gap: 40px;
    margin-top: 60px;
    animation: fadeSlideUp 0.8s 1s both;
  }

  .stat-item { text-align: left; }

  .stat-num {
    font-size: 2rem;
    font-weight: 900;
    color: var(--orange);
    font-family: 'Space Mono', monospace;
  }

  .stat-label {
    font-size: 0.78rem;
    color: #888;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .hero-visual {
    position: absolute;
    right: 3%;
    top: 50%;
    transform: translateY(-50%);
    width: 45%;
    max-width: 580px;
    animation: fadeSlideLeft 1s 0.5s both;
    z-index: 2;
  }

  .hero-card-3d {
    width: 100%;
    aspect-ratio: 4/3;
    position: relative;
    transform-style: preserve-3d;
    animation: float3d 6s ease-in-out infinite;
  }

  .hero-main-card {
    position: absolute;
    inset: 0;
    background: white;
    border-radius: 24px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.15), 0 0 0 1px rgba(232,64,28,0.1);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .hmc-top {
    background: var(--orange);
    height: 45%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .hmc-top::before {
    content: '';
    position: absolute;
    width: 200px; height: 200px;
    background: rgba(255,255,255,0.1);
    border-radius: 50%;
    top: -80px; right: -50px;
  }

  .hmc-icon-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    padding: 20px;
  }

  .hmc-icon {
    width: 52px; height: 52px;
    background: rgba(255,255,255,0.15);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem;
    backdrop-filter: blur(4px);
    border: 1px solid rgba(255,255,255,0.3);
    transition: transform 0.3s;
  }

  .hmc-icon:hover { transform: scale(1.1) rotate(5deg); }

  .hmc-bottom {
    padding: 20px 24px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .hmc-title {
    font-size: 1rem;
    font-weight: 700;
    color: #111;
  }

  .hmc-bars {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .hmc-bar {
    height: 6px;
    background: #f0f0f0;
    border-radius: 3px;
    overflow: hidden;
  }

  .hmc-bar-fill {
    height: 100%;
    background: var(--orange);
    border-radius: 3px;
    animation: barGrow 2s 1.5s both ease-out;
  }

  .hmc-tag {
    display: inline-block;
    background: rgba(232,64,28,0.08);
    color: var(--orange);
    font-size: 0.7rem;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .floating-badge {
    position: absolute;
    background: white;
    border-radius: 16px;
    padding: 10px 16px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.12);
    font-size: 0.8rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
    animation: floatBadge 4s ease-in-out infinite;
  }

  .badge-1 {
    top: -20px; right: -20px;
    animation-delay: 0s;
    color: var(--orange);
  }

  .badge-2 {
    bottom: 20px; left: -30px;
    animation-delay: 2s;
    color: var(--blue);
  }

  /* ── MARQUEE ── */
  .marquee-section {
    position: relative;
    z-index: 1;
    background: var(--orange);
    padding: 16px 0;
    overflow: hidden;
  }

  .marquee-track {
    display: flex;
    gap: 0;
    animation: marqueeScroll 30s linear infinite;
    width: max-content;
  }

  .marquee-item {
    white-space: nowrap;
    color: white;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 0 30px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .marquee-item::after {
    content: '◆';
    font-size: 0.5rem;
    opacity: 0.6;
  }

  /* ── SECTION COMMON ── */
  section {
    position: relative;
    z-index: 1;
  }

  .section-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 100px 5%;
  }

  .section-tag {
    display: inline-block;
    background: rgba(232,64,28,0.08);
    color: var(--orange);
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .section-title {
    font-size: clamp(2rem, 4vw, 3rem);
    font-weight: 900;
    line-height: 1.1;
    margin-bottom: 16px;
    color: #111;
  }

  .section-title span { color: var(--orange); }

  .section-desc {
    font-size: 1.05rem;
    color: #666;
    line-height: 1.7;
    max-width: 540px;
    margin-bottom: 60px;
  }

  /* ── ABOUT ── */
  #about { background: var(--off-white); }

  .about-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
    align-items: center;
  }

  .about-visual {
    position: relative;
  }

  .about-3d-box {
    width: 100%;
    aspect-ratio: 1;
    max-width: 420px;
    margin: auto;
    position: relative;
    transform-style: preserve-3d;
    animation: rotateSlow 15s linear infinite;
  }

  .box-face {
    position: absolute;
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
  }

  .about-ring {
    width: 320px; height: 320px;
    border: 3px solid rgba(232,64,28,0.2);
    border-radius: 50%;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    animation: rotateSlow 20s linear infinite;
  }

  .about-ring-2 {
    width: 240px; height: 240px;
    border: 2px solid rgba(26,106,232,0.15);
    border-radius: 50%;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    animation: rotateSlow 12s linear infinite reverse;
  }

  .about-center {
    width: 160px; height: 160px;
    background: white;
    border-radius: 50%;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 20px 60px rgba(232,64,28,0.2);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    gap: 4px;
  }

  .about-center-num {
    font-size: 2.2rem;
    font-weight: 900;
    color: var(--orange);
    font-family: 'Space Mono', monospace;
  }

  .about-center-text {
    font-size: 0.65rem;
    font-weight: 700;
    color: #888;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .about-orbit-dot {
    width: 44px; height: 44px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
    position: absolute;
  }

  .about-text ul {
    list-style: none;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 24px;
  }

  .about-text ul li {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.9rem;
    color: #444;
    font-weight: 500;
  }

  .about-text ul li::before {
    content: '✓';
    width: 22px; height: 22px;
    background: rgba(232,64,28,0.1);
    color: var(--orange);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem;
    font-weight: 900;
    flex-shrink: 0;
  }

  /* ── SOLUTIONS ── */
  #solutions { background: white; }

  .solutions-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }

  .sol-card {
    background: white;
    border: 1.5px solid #f0f0f0;
    border-radius: 20px;
    padding: 28px;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    cursor: default;
    position: relative;
    overflow: hidden;
  }

  .sol-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(232,64,28,0.04) 0%, transparent 100%);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .sol-card:hover {
    transform: translateY(-8px) scale(1.02);
    border-color: rgba(232,64,28,0.3);
    box-shadow: 0 20px 50px rgba(232,64,28,0.12);
  }

  .sol-card:hover::before { opacity: 1; }

  .sol-icon {
    width: 52px; height: 52px;
    background: rgba(232,64,28,0.08);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem;
    margin-bottom: 16px;
    transition: all 0.3s;
  }

  .sol-card:hover .sol-icon {
    background: var(--orange);
    transform: rotate(-5deg) scale(1.1);
  }

  .sol-title {
    font-size: 1rem;
    font-weight: 700;
    color: #111;
    margin-bottom: 8px;
  }

  .sol-desc {
    font-size: 0.85rem;
    color: #777;
    line-height: 1.6;
  }

  .sol-arrow {
    position: absolute;
    bottom: 20px; right: 20px;
    width: 30px; height: 30px;
    border-radius: 50%;
    background: transparent;
    border: 1.5px solid #eee;
    display: flex; align-items: center; justify-content: center;
    color: #ccc;
    font-size: 0.8rem;
    transition: all 0.3s;
  }

  .sol-card:hover .sol-arrow {
    background: var(--orange);
    border-color: var(--orange);
    color: white;
    transform: rotate(-45deg);
  }

  /* ── PRODUCTS ── */
  #products { background: var(--off-white); }

  .products-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }

  .prod-card {
    background: white;
    border-radius: 16px;
    padding: 24px;
    text-align: center;
    transition: all 0.3s;
    border: 1px solid transparent;
    position: relative;
    overflow: hidden;
  }

  .prod-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: var(--orange);
    transform: scaleX(0);
    transition: transform 0.3s;
    transform-origin: left;
  }

  .prod-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 15px 40px rgba(0,0,0,0.08);
    border-color: rgba(232,64,28,0.15);
  }

  .prod-card:hover::after { transform: scaleX(1); }

  .prod-emoji {
    font-size: 2.2rem;
    margin-bottom: 12px;
    display: block;
    transition: transform 0.3s;
  }

  .prod-card:hover .prod-emoji { transform: scale(1.2) rotate(5deg); }

  .prod-name {
    font-size: 0.85rem;
    font-weight: 700;
    color: #222;
    line-height: 1.3;
  }

  /* ── BRANDS ── */
  #brands { background: white; }

  .brands-title {
    text-align: center;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 3px;
    color: #aaa;
    text-transform: uppercase;
    margin-bottom: 40px;
  }

  .brands-track-wrap {
    overflow: hidden;
    position: relative;
  }

  .brands-track-wrap::before,
  .brands-track-wrap::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    width: 80px;
    z-index: 2;
  }

  .brands-track-wrap::before {
    left: 0;
    background: linear-gradient(to right, white, transparent);
  }

  .brands-track-wrap::after {
    right: 0;
    background: linear-gradient(to left, white, transparent);
  }

  .brands-row {
    display: flex;
    gap: 0;
    animation: marqueeScroll 25s linear infinite;
    width: max-content;
    margin-bottom: 16px;
  }

  .brands-row-2 {
    animation: marqueeScroll 25s linear infinite reverse;
  }

  .brand-pill {
    display: inline-flex;
    align-items: center;
    padding: 8px 20px;
    border: 1.5px solid #eee;
    border-radius: 40px;
    margin: 0 6px;
    font-size: 0.8rem;
    font-weight: 700;
    color: #555;
    white-space: nowrap;
    transition: all 0.3s;
    background: white;
  }

  .brand-pill:hover {
    border-color: var(--orange);
    color: var(--orange);
    transform: scale(1.05);
  }

  /* ── SERVICES ── */
  #services { background: var(--off-white); }

  .services-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }

  .svc-card {
    background: white;
    border-radius: 20px;
    padding: 36px;
    transition: all 0.4s;
    border: 1.5px solid transparent;
    position: relative;
    overflow: hidden;
  }

  .svc-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 4px; height: 0;
    background: var(--orange);
    transition: height 0.4s;
  }

  .svc-card:hover {
    box-shadow: 0 20px 60px rgba(0,0,0,0.07);
    border-color: rgba(232,64,28,0.1);
  }

  .svc-card:hover::before { height: 100%; }

  .svc-num {
    font-family: 'Space Mono', monospace;
    font-size: 3rem;
    font-weight: 700;
    color: rgba(232,64,28,0.08);
    line-height: 1;
    margin-bottom: 12px;
  }

  .svc-title {
    font-size: 1.2rem;
    font-weight: 700;
    color: #111;
    margin-bottom: 12px;
  }

  .svc-desc {
    font-size: 0.9rem;
    color: #666;
    line-height: 1.7;
  }

  /* ── CONTACT ── */
  #contact {
    background: #0D0D0D;
    color: white;
    position: relative;
    overflow: hidden;
  }

  #contact::before {
    content: '';
    position: absolute;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(232,64,28,0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  #contact::after {
    content: '';
    position: absolute;
    bottom: -200px; right: -100px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(26,106,232,0.1) 0%, transparent 70%);
    pointer-events: none;
  }

  .contact-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
    position: relative;
    z-index: 2;
  }

  .contact-left .section-title { color: white; }

  .contact-item {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 24px;
  }

  .contact-icon {
    width: 44px; height: 44px;
    background: rgba(232,64,28,0.15);
    border-radius: 12px;
